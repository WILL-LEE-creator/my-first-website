<!doctype html>
<html>
  <head>
    <title>WILL의 첫 웹사이트</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>안녕하세요, 저는 WILL입니다!</h1>
    <p>웹개발을 배우고 있는 신입 개발자입니다.</p>

    <img src="./lamp_baby.png" alt="프로필 이미지" />

    <a href="https://github.com/WILL-LEE-creator" target="_blank"
      >내 GitHub 바로가기</a
    >

    <button onclick="sayHello()">인사하기</button>
    <p id="message"></p>

    <h2>오늘의 할 일</h2>
    <input type="text" id="todoInput" placeholder="할 일을 입력하세요" />
    <button onclick="addTodo()">추가하기</button>

    <ul id="todoList"></ul>

    <script>
      function sayHello() {
        document.getElementById("message").innerText =
          "안녕하세요, WILL! 웹개발을 시작했군요!";
      }

      function addTodo() {
        const input = document.getElementById("todoInput");
        const todoText = input.value.trim();

        if (todoText !== "") {
          const li = document.createElement("li");
          li.innerText = todoText;

          // 삭제 버튼 생성
          const deleteBtn = document.createElement("button");
          deleteBtn.innerText = "삭제";
          deleteBtn.style.marginLeft = "10px";

          deleteBtn.onclick = function () {
            li.remove();
            saveTodos();
          };

          li.appendChild(deleteBtn);

          // 클릭하면 완료 표시
          li.onclick = function () {
            li.style.textDecoration = "line-through";
            saveTodos();
          };

          document.getElementById("todoList").appendChild(li);
          input.value = "";
          saveTodos();
        }
      }

      function saveTodos() {
        const todos = [];
        document.querySelectorAll("#todoList li").forEach((li) => {
          todos.push(li.innerText.replace("삭제", "").trim());
        });
        localStorage.setItem("todos", JSON.stringify(todos));
      }

      function loadTodos() {
        const saved = JSON.parse(localStorage.getItem("todos") || "[]");
        saved.forEach((todo) => {
          const li = document.createElement("li");
          li.innerText = todo;

          const deleteBtn = document.createElement("button");
          deleteBtn.innerText = "삭제";
          deleteBtn.style.marginLeft = "10px";

          deleteBtn.onclick = function () {
            li.remove();
            saveTodos();
          };

          li.appendChild(deleteBtn);
          document.getElementById("todoList").appendChild(li);
        });
      }

      window.onload = loadTodos;
    </script>
  </body>
</html>
